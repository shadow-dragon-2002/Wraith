name: Build & Release Wraith

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 1.0.1)'
        required: false

jobs:
  build:
    name: Build (Rust, x86_64-pc-windows-gnu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust + Windows target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW
        run: sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp target/x86_64-pc-windows-gnu/release/wraith.exe release/
          cp wraith.ini release/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wraith-windows-x64
          path: release/*

      # ── Only publish a GitHub Release when a version tag is pushed ──────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Wraith ${{ github.ref_name }}
          body: |
            ## Wraith ${{ github.ref_name }}

            ### Installation
            - Download `wraith.exe` + `wraith.ini` and run as Administrator, **or**
            - Download `wraith-setup.exe` for the full installer

            ### What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)

            ### Hotkeys (default)
            | Action | Combo |
            |--------|-------|
            | Lock   | Ctrl+Shift+Alt+L |
            | Unlock | Ctrl+Shift+Alt+U |
            | Panic unlock | Hold Esc for 3 seconds |
          files: |
            release/wraith.exe
            release/wraith.ini
            release/wraith-setup.exe
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  installer:
    name: NSIS Installer (Windows)
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: wraith-windows-x64

      - name: Build NSIS installer
        run: makensis installer\wraith.nsi
        shell: cmd
        continue-on-error: true

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/wraith-setup.exe
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
