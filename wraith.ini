; Wraith Configuration
; https://github.com/nightraven/wraith
;
; Modifier bitmask:  MOD_ALT=1, MOD_CONTROL=2, MOD_SHIFT=4, MOD_WIN=8
; Combine with +     e.g. Ctrl+Shift+Alt = 2+4+1 = 7
;
; Key codes: https://learn.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
; Common:  A-Z = 65-90,  0-9 = 48-57,  Esc = 27,  F1-F12 = 112-123

[Wraith]

; Lock combo: Ctrl+Shift+Alt+L  (default)
LockModifiers=7
LockKey=76

; Unlock combo: Ctrl+Shift+Alt+U  (default)
UnlockModifiers=7
UnlockKey=85

; Panic key: hold this key for 3 seconds while locked to force unlock
; Default: Escape (27)
PanicKey=27

; Lock immediately on launch (0=no, 1=yes)
LockOnStart=0
